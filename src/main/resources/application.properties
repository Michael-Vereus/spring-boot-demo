spring.application.name=demo

# 1. Connection Details
spring.datasource.url=jdbc:mysql://localhost:3306/ssms?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# 2. Hibernate Strategy (The Magic Part)
# 'update' tells Spring to automatically create tables for you
spring.jpa.hibernate.ddl-auto=update

# 3. SQL Logging (So you can see what's happening)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true